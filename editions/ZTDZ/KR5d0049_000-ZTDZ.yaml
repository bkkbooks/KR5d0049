front:
  text: 二書同卷甚四
  hash: sha256:8535ed7ae6451819938b6f7418d2a00dcdf0e29fe4b7d94c2c45dbfa81ee40f1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0049_SJB_000-210699a, image: sjb/21/210699a.png}
body:
  text: 天隱子素覆子天隱子序神仙之道以長生爲本長生之要以養氣爲先夫氣受之於天地和之於隂陽隂陽神虚謂之心心主晝夜寤寐謂之魂魄如此人之身大率不遠乎神仙之道天隱子吾不知其何許人著書八篇包括秘妙殆非人間所能力學觀夫修鍊形氣養和心虚歸根契於伯陽遺照齊於莊叟長生乆視無出是書承禎服習道風惜乎世人夭促眞壽思欲傳之同志使簡易而行信哉自伯陽而來唯天隱子而已矣謹序天隱子上清十三代宗師有天師貞一先生司馬承禎述神仙人生時禀得虚氣精明通悟學無滯塞則謂之神宅神於内遺照於外自然異於俗人則謂之神仙故神仙亦人也在於修我虚氣勿爲世俗所論折遂我自然勿爲邪見所凝滯則成功矣喜怒哀樂愛惡欲七者情之邪也風寒暑濕飢飽勞逸人者氣之邪也去此邪成仙功也易簡易曰天地之道易簡者何也天隱子曰天地在我首之上足之下開目盡見無假繁巧而言故曰易簡簡者神仙之德也經曰至道不繁至人無爲然則以何道求之曰無求不能知無道不能成凡學神仙先知易簡荀言涉奇詭適足使人執迷無所歸本此非吾學也世人學仙及爲仙所迷者有矣學炁反爲炁所病者有矣漸門易有漸卦老氏有妙門人之修眞達性不能頓悟必須漸而進之安而行之故設漸門一曰齋戒二曰安處三曰存想四曰坐忘五曰神解何謂齋戒曰澡身虚心何謂安處曰深居靜室何謂存想曰收心復性何謂坐忘曰遺形忘我何謂神解曰萬法通神是故習此五漸之門者了一則漸次至二了二則漸次至三了三則漸次至四了四則漸次至五神仙成矣齋戒齋戒者非蔬茄飲食而已澡身非湯浴去垢而已蓋其法在節食調中磨擦暢外者也夫人稟五行之氣而食五行之物而實自胞胎有形也呼吸精血豈可去食而求長生但世人不知休糧服氣道家權宜非永絶食粒之謂也食之有齋戒者齋乃潔淨之務戒乃節愼之稱有飢即食食勿令飽此所謂調中也百味未成熟勿食五味大多勿食腐敗閉氣之物勿食此皆宜戒也手常磨擦皮膚温熱熨去冷氣此所謂暢外也乆坐乆立乆勞役皆宜戒也此是調理形骸之法形堅則氣全是以齋戒爲漸門之首矣安處何謂安處曰非華堂邃宇重烟廣榻之謂也在乎南向而坐東首而寢隂陽適中明暗相半屋無高高則陽盛而明多屋無卑卑則隂盛而暗多故明多則傷魄暗多則傷魂人之魂陽而魄隂荀傷明暗則疾病生焉此所謂居處之室尚使之然況天地之氣有亢陽之攻肌淫隂之侵體豈不防愼哉修養之漸倘不法此非安處之道術曰吾所居室四邊皆窗户遇風即闔風息即閑吾所居座前簾後屛太明則下簾以利其内暎太暗則捲簾以通其外曜内以安心外以安目心目皆安矣明暗尚然況大多事慮大多情欲豈能安其内外哉故學道以安處爲次存想存謂存我之神想謂想我之身閉目即見自己之目收心即見自己之心心與目皆不離我身不傷我神則存想之漸也凡人目終日視他人故心亦逐外走終日接他事故目亦逐外膽營營浮光未嘗復照柰何不病且夭邪是以歸根曰靜靜曰復命誠性存存衆妙之門此存想之漸學道之功半矣坐忘坐忘者因存想而得也因存想而忘也行道而不見其行非坐之義乎有見而不行其見非忘之義乎何謂不行曰心不動故何謂不見曰形都泯故天隱子瞑而不視或者悟道乃退曰道果在我矣我果何人哉天隱子果何人哉於是彼我兩忘了無所照神解一齋戒謂之信解言無信心即不能解二安處謂之閑解言無閑心即不能解三存想謂之慧解言無慧心即不能解四坐忘謂之定解言無定心即不能解信定閑慧四門通神謂之神解故神之爲義不行而至不疾而速隂陽變通天地長乆兼三才而言謂之易繫辭曰易窮則變變則通通則乆齊萬物而言謂之道德老子道徑德經是也本一性而言謂之眞如天隱子生乎易中死乎易中動因萬物靜因萬物邪由一性眞由一性是以生死動靜邪眞吾皆以神而解之在人謂之仙矣在天曰天仙在地曰地仙故神仙之道五歸一門謂五漸終同歸於仙矣天隱子素履子序夫素履子者取周易履卦初九素履往無咎以純素爲本履以履行爲先雖衣布素須履先王之政教故取天地之始乾坤之初聖人設教之規賢哲行道之跡夫禍福之端生于所履是以聖人以德履帝位而不疚光明者也士庶履能辯上下定民志輒修一十四篇號曰素履子以爲箴誡而已
